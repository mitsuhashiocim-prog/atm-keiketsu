<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍼灸学習ツール</title>
<style>
  :root {
    --teal: #028090;
    --teal-light: #04a3b8;
    --teal-pale: #e0f5f8;
    --navy: #1A2E44;
    --navy-mid: #2c4a6e;
    --white: #ffffff;
    --off-white: #f4f8fa;
    --gray-100: #e8edf2;
    --gray-500: #607d8b;
    --text: #1a2e44;
    --font-main: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-main);
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    padding: 56px 24px 64px;
    text-align: center;
    color: var(--white);
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--teal-light); }
  header p {
    margin-top: 10px;
    font-size: 14px;
    color: rgba(255,255,255,0.75);
  }

  main {
    flex: 1;
    max-width: 920px;
    width: 100%;
    margin: -36px auto 0;
    padding: 0 20px 60px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }

  .tool-card {
    display: block;
    background: var(--white);
    border-radius: 16px;
    padding: 26px 24px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 10px 30px rgba(2,128,144,0.10);
    border: 1px solid var(--gray-100);
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  }
  .tool-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(2,128,144,0.18);
    border-color: var(--teal-light);
  }

  .tool-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 16px;
  }

  .tool-card h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .tool-card p {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.7;
  }
  .tool-card .tag {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    background: var(--teal-pale);
    padding: 3px 10px;
    border-radius: 10px;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--gray-500);
  }

  @media (max-width: 600px) {
    header { padding: 44px 20px 56px; }
    header h1 { font-size: 23px; }
    main { padding: 0 16px 40px; }
  }
</style>
</head>
<body>

<header>
  <h1>鍼灸<span>学習ツール</span></h1>
  <p>鍼灸学生のための学習支援アプリ集</p>
</header>

<main>
  <div class="card-grid">

    <a class="tool-card" href="https://mitsuhashiocim-prog.github.io/atm-keiketsu/">
      <div class="tool-icon" style="background:#e0f5f8;color:#028090">📍</div>
      <h2>経穴図鑑</h2>
      <p>WHO標準361穴の取穴部位・主治・要穴を収録。流注図タップ、暗記カード、試験モード、学習記録機能つき。</p>
      <span class="tag">経穴・経絡</span>
    </a>

    <a class="tool-card" href="https://mitsuhashiocim-prog.github.io/atm-kakomondai/">
      <div class="tool-icon" style="background:#fdecea;color:#c0392b">📝</div>
      <h2>鍼灸国家試験過去問</h2>
      <p>国家試験の過去問を繰り返し練習できる学習アプリです。</p>
      <span class="tag">国家試験対策</span>
    </a>

    <a class="tool-card" href="https://mitsuhashiocim-prog.github.io/atm-tosyukensa/">
      <div class="tool-icon" style="background:#eef2ff;color:#3949ab">🦴</div>
      <h2>整形外科的テストナビ</h2>
      <p>整形外科的テストの手技・目的・陽性所見を確認できるナビゲーターです。</p>
      <span class="tag">臨床・実技</span>
    </a>

  </div>
</main>

<footer>&copy; 2026 mitsuhashiocim-prog</footer>

</body>
</html>
