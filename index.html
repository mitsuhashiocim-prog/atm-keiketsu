<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経穴図鑑 — 鍼灸学習リファレンス</title>
<style>
  :root {
    --teal: #028090;
    --teal-light: #04a3b8;
    --teal-pale: #e0f5f8;
    --navy: #1A2E44;
    --navy-mid: #2c4a6e;
    --white: #ffffff;
    --off-white: #f4f8fa;
    --gray-100: #e8edf2;
    --gray-300: #b0bec5;
    --gray-500: #607d8b;
    --text: #1a2e44;
    --font-main: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-main); background: var(--off-white); color: var(--text); min-height: 100vh; }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .logo { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.05em; white-space: nowrap; }
  .logo span { color: var(--teal-light); }
  .header-search { flex: 1; max-width: 380px; position: relative; }
  .header-search input {
    width: 100%; padding: 8px 12px 8px 34px;
    border-radius: 20px; border: none;
    background: rgba(255,255,255,0.12); color: #fff;
    font-size: 14px; outline: none; transition: background 0.2s;
  }
  .header-search input::placeholder { color: rgba(255,255,255,0.5); }
  .header-search input:focus { background: rgba(255,255,255,0.2); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 15px; pointer-events: none; }
  .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .header-count { color: var(--gray-300); font-size: 13px; white-space: nowrap; }

  /* Filter chips */
  .filter-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-100);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 14px;
    border: 1.5px solid var(--gray-100);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    color: var(--gray-500);
  }
  .filter-chip:hover { border-color: var(--teal-light); color: var(--teal); }
  .filter-chip.active { background: var(--teal); border-color: var(--teal); color: var(--white); }
  .filter-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Layout */
  .container { display: flex; min-height: calc(100vh - 100px); }

  /* Sidebar */
  aside {
    width: 200px;
    background: var(--white);
    border-right: 1px solid var(--gray-100);
    padding: 12px 0;
    flex-shrink: 0;
    position: sticky;
    top: 100px;
    height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--gray-500); padding: 0 14px 6px; text-transform: uppercase; }
  .meridian-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 14px;
    background: none; border: none; cursor: pointer;
    text-align: left; font-size: 12.5px; color: var(--text);
    transition: background 0.15s; border-left: 3px solid transparent;
  }
  .meridian-btn:hover { background: var(--teal-pale); }
  .meridian-btn.active { background: var(--teal-pale); border-left-color: var(--teal); color: var(--teal); font-weight: 600; }
  .meridian-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .meridian-cnt { margin-left: auto; font-size: 11px; color: var(--gray-500); background: var(--gray-100); padding: 1px 5px; border-radius: 8px; }
  .meridian-btn.active .meridian-cnt { background: var(--teal); color: var(--white); }

  /* Main */
  main { flex: 1; padding: 18px 20px; overflow-y: auto; }
  .section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--navy); }
  .section-sub { font-size: 12px; color: var(--gray-500); }
  .meridian-badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--white); }

  /* Card grid */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
  .acupoint-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--gray-100); cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    overflow: hidden;
  }
  .acupoint-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(2,128,144,0.12); border-color: var(--teal-light); }
  .card-top { display: flex; align-items: center; padding: 10px 13px 8px; gap: 10px; border-bottom: 1px solid var(--gray-100); }
  .card-code { font-size: 11px; font-weight: 700; color: var(--white); padding: 2px 7px; border-radius: 5px; min-width: 36px; text-align: center; flex-shrink: 0; }
  .card-name-ja { font-size: 16px; font-weight: 700; color: var(--navy); }
  .card-name-reading { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
  .card-body { padding: 8px 13px 10px; }
  .card-location { font-size: 12px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .tag { font-size: 10.5px; padding: 1px 6px; border-radius: 8px; background: var(--teal-pale); color: var(--teal); font-weight: 500; }

  /* Detail overlay */
  .detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,46,68,0.5); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: var(--white); border-radius: 14px;
    max-width: 580px; width: 100%; max-height: 86vh;
    overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .detail-header {
    padding: 18px 22px 14px; border-bottom: 2px solid var(--teal-pale);
    position: sticky; top: 0; background: var(--white);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .detail-code-badge { font-size: 13px; font-weight: 700; color: var(--white); padding: 3px 10px; border-radius: 7px; flex-shrink: 0; margin-top: 3px; }
  .detail-title-block { flex: 1; }
  .detail-name { font-size: 24px; font-weight: 700; color: var(--navy); }
  .detail-reading { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
  .detail-close {
    background: var(--gray-100); border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 16px; cursor: pointer;
    color: var(--gray-500); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .detail-close:hover { background: var(--gray-300); }
  .detail-body { padding: 18px 22px; }
  .detail-section { margin-bottom: 16px; }
  .detail-section-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 5px;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section-label::after { content: ''; flex: 1; height: 1px; background: var(--teal-pale); }
  .detail-section p { font-size: 13.5px; line-height: 1.8; color: var(--text); }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-tag { font-size: 12px; padding: 3px 9px; border-radius: 10px; background: var(--teal-pale); color: var(--teal); font-weight: 500; }

  /* Empty */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
  .empty-state .icon { font-size: 44px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

  @media (max-width: 700px) {
    /* サイドバーは非表示 */
    aside { display: none; }

    /* ヘッダー：2行レイアウト */
    header {
      flex-wrap: wrap;
      padding: 10px 14px 8px;
      gap: 8px;
    }
    .header-search {
      order: 3;
      max-width: 100%;
      width: 100%;
      flex: unset;
    }
    .header-right { order: 2; }

    /* フィルターバー：少し小さめ */
    .filter-bar { padding: 7px 12px; gap: 5px; }
    .filter-chip { font-size: 11px; padding: 4px 10px; }

    /* メイン：余白縮小 */
    main { padding: 14px 12px; }

    /* カード：縦1列 */
    .card-grid { grid-template-columns: 1fr; gap: 10px; }

    /* カード内フォントを少し大きく（タップしやすく） */
    .card-name-ja { font-size: 17px; }
    .card-top { padding: 12px 14px 10px; }
    .card-body { padding: 10px 14px 12px; }
    .card-location { font-size: 13px; }

    /* 詳細パネル：ほぼ全画面 */
    .detail-overlay { padding: 0; align-items: flex-end; }
    .detail-panel {
      border-radius: 18px 18px 0 0;
      max-width: 100%;
      max-height: 90vh;
    }
    .detail-header { padding: 16px 18px 12px; }
    .detail-name { font-size: 22px; }
    .detail-body { padding: 14px 18px 28px; }
  }

  /* ── 流注図パネル ── */
  .ryuchu-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,46,68,0.6); z-index: 300;
    align-items: center; justify-content: center; padding: 16px;
  }
  .ryuchu-overlay.open { display: flex; }
  .ryuchu-panel {
    background: var(--white); border-radius: 16px;
    width: min(420px, 96vw); max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .ryuchu-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--gray-100);
    background: var(--white);
    flex-shrink: 0;
  }
  .ryuchu-title { font-size: 16px; font-weight: 700; color: var(--navy); flex: 1; }
  .ryuchu-close {
    background: var(--gray-100); border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 16px; cursor: pointer;
    color: var(--gray-500); display: flex; align-items: center; justify-content: center;
  }
  .ryuchu-body {
    flex: 1; overflow-y: auto; display: flex; justify-content: center;
    padding: 10px 8px;
  }
  .ryuchu-svg-wrap { position: relative; }
  .ryuchu-svg-wrap svg { display: block; }
  .ryuchu-tip {
    font-size: 11px; color: var(--gray-500); text-align: center;
    padding: 6px 0 10px; flex-shrink: 0;
  }

  /* ── 流注図ボタン（経絡選択時に表示） ── */
  .ryuchu-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 14px;
    border: 1.5px solid var(--teal); background: var(--white);
    color: var(--teal); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; margin-left: auto;
  }
  .ryuchu-btn:hover { background: var(--teal); color: var(--white); }

  /* ── 要穴バッジ（カード内） ── */
  .youketsu-badge {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    padding: 1px 5px; border-radius: 4px;
    background: #e65100; color: #fff;
    margin-left: 5px; vertical-align: middle;
    flex-shrink: 0;
  }
  .youketsu-badge.five { background: #6a1b9a; }
  .youketsu-badge.hachi { background: #1565c0; }
  .youketsu-badge.hachi-kai { background: #00695c; }

  /* ── カード：要穴強調 ── */
  .acupoint-card.has-youketsu { border-left: 3px solid #e65100; }
  .acupoint-card.has-youketsu .card-name-ja { color: var(--navy); }

  @media (max-width: 700px) {
    .ryuchu-panel { width: 100%; max-height: 92vh; border-radius: 18px 18px 0 0; }
    .ryuchu-overlay { padding: 0; align-items: flex-end; }
  }

</style>
</head>
<body>

<header>
  <div class="logo">経穴<span>図鑑</span></div>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="経穴名・読み・要穴で検索…">
  </div>
  <div class="header-right">
    <div class="header-count" id="headerCount"></div>
  </div>
</header>

<div class="filter-bar" id="filterBar"></div>

<div class="container">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<div class="ryuchu-overlay" id="ryuchuOverlay">
  <div class="ryuchu-panel">
    <div class="ryuchu-header">
      <div class="ryuchu-title" id="ryuchuTitle">流注図</div>
      <button class="ryuchu-close" onclick="closeRyuchu()">✕</button>
    </div>
    <div class="ryuchu-body" style="overflow:auto;display:flex;justify-content:center;align-items:flex-start">
      <div class="ryuchu-svg-wrap" id="ryuchuSVGWrap" style="text-align:center"></div>
    </div>
    <div class="ryuchu-tip">● 経穴をタップすると詳細を表示　🔴 要穴</div>
  </div>
</div>

<script>

const MERIDIANS = [
  { id:'ALL', name:'すべて', abbr:'全経絡', color:'#028090', count:407 },
  { id:'LU', name:'肺経', abbr:'手の太陰肺経', color:'#7986CB' },
  { id:'LI', name:'大腸経', abbr:'手の陽明大腸経', color:'#4CAF50' },
  { id:'ST', name:'胃経', abbr:'足の陽明胃経', color:'#FFA726' },
  { id:'SP', name:'脾経', abbr:'足の太陰脾経', color:'#AB47BC' },
  { id:'HT', name:'心経', abbr:'手の少陰心経', color:'#EF5350' },
  { id:'SI', name:'小腸経', abbr:'手の太陽小腸経', color:'#26C6DA' },
  { id:'BL', name:'膀胱経', abbr:'足の太陽膀胱経', color:'#42A5F5' },
  { id:'KI', name:'腎経', abbr:'足の少陰腎経', color:'#26A69A' },
  { id:'PC', name:'心包経', abbr:'手の厥陰心包経', color:'#EC407A' },
  { id:'TE', name:'三焦経', abbr:'手の少陽三焦経', color:'#FF7043' },
  { id:'GB', name:'胆経', abbr:'足の少陽胆経', color:'#66BB6A' },
  { id:'LR', name:'肝経', abbr:'足の厥陰肝経', color:'#8D6E63' },
  { id:'GV', name:'督脈', abbr:'督脈', color:'#78909C' },
  { id:'CV', name:'任脈', abbr:'任脈', color:'#9E9E9E' },
  { id:'EX', name:'奇穴', abbr:'経外奇穴', color:'#FFC107' },

const ACUPOINTS = [{"id": "LU1", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "中府", "reading": "ちゅうふ", "youketsu": "肺の募穴", "location": "前胸部、第1肋間と同じ高さ、鎖骨下窩外側部、前正中線の外方6寸。", "needling": "鎖骨下窩(雲門)の下方1寸、第1肋間部に取る。烏口突起の内側、大胸筋と三角筋の間の溝(三角胸筋溝)に触れて取穴する。", "anatomy": "大胸筋、小胸筋、肋間筋〈内側・外側胸筋神経、肋間神経〉鎖骨上神経、肋間神経外側皮枝［血管］胸肩峰動脈、腋窩動脈"}, {"id": "LU2", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "雲門", "reading": "うんもん", "youketsu": "", "location": "前胸部、鎖骨下窩の陥凹部、烏口突起の内方、前正中線の外方6寸。", "needling": "鎖骨と肩関節を結ぶ三角胸筋溝の陥凹部に取る。中府の上方1寸に位置する。", "anatomy": "三角筋、大胸筋〈腋窩神経、内側・外側胸筋神経〉鎖骨上神経［血管］胸肩峰動脈、腋窩動脈"}, {"id": "LU3", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "天府", "reading": "てんぷ", "youketsu": "", "location": "上腕前内側面、上腕二頭筋の橈側縁、腋窩横紋前端の下方3寸。", "needling": "腋窩横紋前端(前腋窩線)から3寸下がり、上腕二頭筋外側縁に取る。", "anatomy": "上腕二頭筋〈筋皮神経〉内側上腕皮神経［血管］上腕動脈の分枝"}, {"id": "LU4", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "侠白", "reading": "きょうはく", "youketsu": "", "location": "上腕前内側面、上腕二頭筋の橈側縁、腋窩横紋前端の下方4寸、または尺沢の上方5寸。", "needling": "天府の下方1寸、上腕二頭筋の橈側縁に取る。尺沢と腋窩横紋前端を結ぶ線のほぼ中間。", "anatomy": "上腕二頭筋〈筋皮神経〉内側上腕皮神経［血管］上腕動脈の分枝"}, {"id": "LU5", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "尺沢", "reading": "しゃくたく", "youketsu": "合(五輸穴)", "location": "肘前面、肘窩横紋上、上腕二頭筋腱の橈側の陥凹部。", "needling": "肘を軽く屈曲させ、肘窩横紋上で上腕二頭筋腱の外側(橈側)の陥凹部に取る。", "anatomy": "上腕二頭筋腱、腕橈骨筋〈筋皮神経、橈骨神経〉前腕外側皮神経［血管］橈側皮静脈、橈側反回動脈"}, {"id": "LU6", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "孔最", "reading": "こうさい", "youketsu": "郄穴", "location": "前腕前外側面、尺沢と太淵を結ぶ線上、手関節掌側横紋の上方7寸。", "needling": "尺沢と太淵を結ぶ線上で、手関節掌側横紋から7寸上方に取る。腕橈骨筋の中に取穴する。", "anatomy": "腕橈骨筋、円回内筋〈橈骨神経、正中神経〉前腕外側皮神経［血管］橈骨動脈の分枝"}, {"id": "LU7", "meridian": "LU", "meridianName": "手の太陰肺経", "name": "列欠", "reading": "れっけつ", "youketsu": "絡穴・八脈交会穴(任脈)", "location": "前腕橈側面、長母指外転筋腱と短母指伸筋腱の間、手関節掌側横紋の上方1寸5分。", "needling": "母指と示指を開いて(虎口をつくり)、両手の合谷部を交叉させて示指先端があたる橈骨茎状突起上の陥凹部に取る(交叉取穴法)。太淵の上方1寸5分。", "anatomy": "腕橈骨筋腱、長母指外転筋腱〈橈骨神経〉外側前腕皮神経、橈骨神経浅枝［血管］橈骨動脈"}, {"id": "LU8", "meridian": "LU", "meridianName": "手の太陰肺経 let selectedMeridian = 'ALL';
let searchQuery = '';

function getMeridian(id) { return MERIDIANS.find(m=>m.id===id); }
function getColor(meridianId) { return getMeridian(meridianId)?.color || '#028090'; }

// 経穴ごとの要穴タグをリスト化
function parseTags(youketsu) {
  if (!youketsu) return [];
  return youketsu.split('・').map(t=>t.trim()).filter(Boolean);
}

// --- Sidebar ---
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">経絡</div>';
  MERIDIANS.forEach(m => {
    const cnt = m.id === 'ALL' ? ACUPOINTS.length : ACUPOINTS.filter(a=>a.meridian===m.id).length;
    if (cnt === 0) return;
    const active = selectedMeridian === m.id ? 'active' : '';
    html += `<button class="meridian-btn ${active}" onclick="selectMeridian('${m.id}')">
      <span class="meridian-dot" style="background:${m.color}"></span>
      ${m.name}
      <span class="meridian-cnt">${cnt}</span>
    </button>`;
  });
  sidebar.innerHTML = html;
}

  let list = ACUPOINTS;
  if (selectedMeridian !== 'ALL') list = list.filter(a=>a.meridian===selectedMeridian);
  if (activeYouketsu !== 'all') list = list.filter(a=>a.youketsu.includes(activeYouketsu));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a =>
      a.name.includes(q) || a.reading.includes(q) ||
      a.id.toLowerCase().includes(q) || a.youketsu.includes(q) ||
      a.location.includes(q)
    );
  }
  return list;
}

// --- Main ---
function renderMain() {
  const filtered = getFiltered();
  const main = document.getElementById('main');
  document.getElementById('headerCount').textContent = `${filtered.length} 穴表示中`;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>該当する経穴が見つかりません</p></div>`;
    return;
  }

  const m = getMeridian(selectedMeridian);
  const title = selectedMeridian === 'ALL' ? '全経絡' : m?.name || '';
  const sub = selectedMeridian === 'ALL' ? '' : m?.abbr || '';
  const badge = selectedMeridian !== 'ALL'
    ? `<span class="meridian-badge" style="background:${m?.color}">${title}</span>` : '';

  const cards = filtered.map(a => {
    const color = getColor(a.meridian);
    const tags = parseTags(a.youketsu).map(t=>`<span class="tag">${t}</span>`).join('');
    const loc = a.location.length > 50 ? a.location.slice(0,50)+'…' : a.location;
    const yShort = getYouketsuShort(a.youketsu);
    const yBadge = yShort ? `<span class="youketsu-badge ${getYouketsuClass(a.youketsu)}">${yShort}</span>` : '';
    const hasY = a.youketsu ? 'has-youketsu' : '';
    return `<div class="acupoint-card ${hasY}" onclick="openDetail('${a.id}')">
      <div class="card-top">
        <span class="card-code" style="background:${color}">${a.id}</span>
        <div class="card-names">
          <div class="card-name-ja" style="display:flex;align-items:center">${a.name}${yBadge}</div>
          <div class="card-name-reading">${a.reading}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-location">${loc}</div>
        <div class="card-tags">${tags}</div>
      </div>
    </div>`;
  }).join('');

  const hasMap = (selectedMeridian !== 'ALL' && selectedMeridian !== 'EX');
  const mapBtn = hasMap ? `<button class="ryuchu-btn" onclick="openRyuchu('${selectedMeridian}')">🗺 流注図</button>` : '';
  main.innerHTML = `
    <div class="section-header">
      ${badge}
      <div class="section-title">${title}</div>
      ${sub ? `<div class="section-sub">${sub}</div>` : ''}
      ${mapBtn}
    </div>
    <div class="card-grid">${cards}</div>`;
}

// --- Detail ---
function openDetail(id) {
  const a = ACUPOINTS.find(p=>p.id===id);
  if (!a) return;
  const color = getColor(a.meridian);
  const tags = parseTags(a.youketsu).map(t=>`<span class="detail-tag">${t}</span>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <span class="detail-code-badge" style="background:${color}">${a.id}</span>
      <div class="detail-title-block">
        <div class="detail-name">${a.name}</div>
        <div class="detail-reading">${a.reading}　｜　${a.meridianName}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-label">取穴部位</div>
        <p>${a.location}</p>
      </div>
      <div class="detail-section">
        <div class="detail-section-label">取り方</div>
        <p>${a.needling}</p>
      </div>
      <div class="detail-section">
        <div class="detail-section-label">解剖</div>
        <p>${a.anatomy}</p>
      </div>
      ${tags ? `<div class="detail-section">
        <div class="detail-section-label">要穴・分類</div>
        <div class="detail-tags">${tags}</div>
      </div>` : ''}
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', function(e){
  if (e.target === this) closeDetail();
});

function selectMeridian(id) {
  selectedMeridian = id;
  renderSidebar();
  renderMain();
}

document.getElementById('searchInput').addEventListener('input', function(){
  searchQuery = this.value.trim();
  renderSidebar();
  renderMain();
});

renderSidebar();
renderFilterBar();
renderMain();

// ─────────────────────────────────────────────
// 要穴略称

function getYouketsuShort(y) {
  if (!y) return '';
  if (y.includes('井') && y.includes('五輸')) return '井';
  if (y.includes('榮') && y.includes('五輸')) return '榮';
  if (y.includes('兪') && y.includes('五輸')) return '兪';
  if (y.includes('経') && y.includes('五輸')) return '経';
  if (y.includes('合') && y.includes('五輸')) return '合';
  if (y.includes('原穴')) return '原';
  if (y.includes('絡穴')) return '絡';
  if (y.includes('郄穴')) return '郄';
  if (y.includes('募穴')) return '募';
  if (y.includes('背部兪穴')) return '兪穴';
  if (y.includes('八会穴')) return '八会';
  if (y.includes('八脈交会穴')) return '八脈';
  if (y.includes('下合穴')) return '下合';
  return '';
}
function getYouketsuClass(y) {
  if (!y) return '';
  if (y.includes('五輸')) return 'five';
  if (y.includes('八会穴')) return 'hachi-kai';
  if (y.includes('八脈交会穴')) return 'hachi';
  return '';
}

function buildRyuchuHTML(meridianId) {
  const meta   = PNG_META[meridianId];
  if (!meta) return '<p style="color:#aaa;padding:20px">この経絡の流注図は準備中です</p>';
  const coords = PNG_COORDS[meridianId] || {};
  const order  = PNG_ORDER[meridianId]  || [];
  const color  = meta.color;
  const W = meta.w, H = meta.h;

  // 経穴データマップ
  const apMap = {};
  ACUPOINTS.forEach(a => { apMap[a.id] = a; });

  // 有効座標の経穴だけ
  const pts = order.filter(id => coords[id]);

  // SVG内容生成（画像も SVG <image> で描画 → viewBox座標と完全一致）
  let svgContent = '';

  // 流注ライン
  const lineCoords = pts.map(id => coords[id].join(',')).join(' ');
  if (lineCoords) {
    svgContent += `<polyline points="${lineCoords}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>`;
  }

  // 経穴ドット
  pts.forEach(id => {
    const [cx, cy] = coords[id];
    const a = apMap[id];
    if (!a) return;
    const isY = !!a.youketsu;
    const yShort = getYouketsuShort(a.youketsu);
    const r = isY ? 10 : 7;
    const fill = isY ? '#e65100' : color;
    svgContent += `
      <g style="cursor:pointer" onclick="apDotClick('${id}')">
        <circle cx="${cx}" cy="${cy}" r="${r+8}" fill="transparent"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="white" stroke-width="2"/>
        ${isY ? `<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="none" stroke="${fill}" stroke-width="1.5" opacity="0.5"/>` : ''}
        <text x="${cx+r+4}" y="${cy+5}" font-size="14" fill="#1a2e44" font-weight="${isY?'700':'400'}"
          style="text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white">${a.name}</text>
        ${yShort ? `<rect x="${cx+r+4 + a.name.length*11}" y="${cy-10}" width="${yShort.length*9+6}" height="16" rx="4" fill="#e65100"/>
        <text x="${cx+r+6 + a.name.length*11}" y="${cy+2}" font-size="12" fill="white" font-weight="700">${yShort}</text>` : ''}
      </g>`;
  });

  const coordCount = pts.length;
  const totalCount = order.length;
  const progressMsg = coordCount < totalCount
    ? `<div style="font-size:12px;color:#e65100;text-align:center;padding:4px">座標登録済み: ${coordCount}/${totalCount}穴</div>`
    : '';

  // 画像を背景として固定幅のコンテナ内に表示
  // SVGはviewBox="0 0 W H" で同じ比率で重ねる → 座標完全一致
  const displayH = Math.round(420 * H / W);  // 幅420px基準の高さ

  // svgContentから<image>タグを除去（背景はimgタグで）
  const dotsSVG = svgContent;

  const pct = (H / W * 100).toFixed(2);
  // srcはinnerHTMLに含めずDOMで後からセット（大容量base64をinnerHTML経由にしない）
  return { progressMsg, pct, W, H, dotsSVG, src: meta.src };
}

function openRyuchu(meridianId) {
  const m = getMeridian(meridianId);
  document.getElementById('ryuchuTitle').textContent = (m?.abbr || m?.name || '') + ' 流注図';

  const r = buildRyuchuHTML(meridianId);
  const wrap = document.getElementById('ryuchuSVGWrap');

  if (typeof r === 'string') {
    // 座標なし（準備中）の場合
    wrap.innerHTML = r;
  } else {
    // 通常ケース：DOM操作でsrcをセット
    wrap.innerHTML = `
      ${r.progressMsg}
      <div id="ryuchuImgWrap" style="position:relative;width:100%;max-width:420px;padding-bottom:${r.pct}%">
        <img id="ryuchuImg" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;object-fit:fill">
        <svg id="ryuchuSVG"
             style="position:absolute;top:0;left:0;width:100%;height:100%"
             viewBox="0 0 ${r.W} ${r.H}"
             preserveAspectRatio="none"
             xmlns="http://www.w3.org/2000/svg"
             font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
          ${r.dotsSVG}
        </svg>
      </div>`;
    // srcを別途セット（innerHTML経由で大容量base64を流さない）
    document.getElementById('ryuchuImg').src = r.src;
  }

  document.getElementById('ryuchuOverlay').classList.add('open');
}

function closeRyuchu() {
  document.getElementById('ryuchuOverlay').classList.remove('open');
}

function apDotClick(id) {
  closeRyuchu();
  setTimeout(() => openDetail(id), 100);
}

document.getElementById('ryuchuOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeRyuchu();
});
